<summary>Vocabulary</summary>

<h5 id="treatise-C-n"><a href="#treatise-C-n" class="headerlink" title="treatise, [C]n."></a>treatise, [C]n.</h5><p>He (Socates) was interested in moral issues and philosophized neither by giving lectures nor by writing treatises, but by talking with other people.</p>
<h5 id="interlocutor-C-n"><a href="#interlocutor-C-n" class="headerlink" title="interlocutor, [C]n."></a>interlocutor, [C]n.</h5><p>Socrates examined the views of his interlocutors by means of questions and answers to look into the logical coherence of the proposed views.</p>
<h5 id="dialectic"><a href="#dialectic" class="headerlink" title="dialectic"></a>dialectic</h5><p>Since <em>dialogue</em> is the way by which Socrates practiced philosophy his method is known as <em>dialectic</em>.</p>
<h5 id="eulogy"><a href="#eulogy" class="headerlink" title="eulogy"></a>eulogy</h5><p>There are siz speakers, each giving a eulogy of the god of love.</p>
<h5 id="surpass"><a href="#surpass" class="headerlink" title="surpass"></a>surpass</h5><p>Each of them tried to surpass the previous one by adding new perspectives in his speach.</p>
<h5 id="prologue"><a href="#prologue" class="headerlink" title="prologue"></a>prologue</h5><h5 id="definite-adj"><a href="#definite-adj" class="headerlink" title="definite, adj."></a>definite, adj.</h5><p>He wasn’t much help &mdash; couldn’t remember anything very definite.</p>
<h5 id="garbled"><a href="#garbled" class="headerlink" title="garbled"></a>garbled</h5><p>You must have been given a pretty garbled account.</p>
<h5 id="account"><a href="#account" class="headerlink" title="account"></a>account</h5><h5 id="whirl"><a href="#whirl" class="headerlink" title="whirl,"></a>whirl,</h5><p>Before that, my life was just a random whirl of activity.</p>
<p>[informal] give sth. a whirl</p>
<h5 id="get-on-with-it"><a href="#get-on-with-it" class="headerlink" title="get on with it"></a>get on with it</h5><h5 id="tremendous-adj"><a href="#tremendous-adj" class="headerlink" title="tremendous, adj."></a>tremendous, adj.</h5><p>In any case I get tremendous pleasure out of talking about philosophy myself, or listening to other people talk about it, quite apart from thinking it’s good for me.</p>
<h5 id="bore-me-stiff"><a href="#bore-me-stiff" class="headerlink" title="bore me stiff"></a>bore me stiff</h5><p>Other conversation, especially your kind, about money or business, bores me stiff.</p>
<h5 id="misguided"><a href="#misguided" class="headerlink" title="misguided"></a>misguided</h5><p>However, I don’t <em>think</em> you are misguided, I know for certain you are.</p>
<h5 id="fury-n"><a href="#fury-n" class="headerlink" title="fury, n."></a>fury, n.</h5><p>I don’t know where you picked up the nickname “softy”; it certainly doesn’t fit your conversation&mdash;always full of fury against yourself, and everyone else apart from Socrates.</p>
<h5 id="elegant-adj"><a href="#elegant-adj" class="headerlink" title="elegant, adj."></a>elegant, adj.</h5><h5 id="nonetity"><a href="#nonetity" class="headerlink" title="nonetity"></a>nonetity</h5><p>It’ll be a question of a nonetity coming to dinner uninvited wwith a wise man.</p>
<h5 id="How-come-…"><a href="#How-come-…" class="headerlink" title="How come …"></a>How come …</h5><p>How come you haven’t brought Socrates with you?</p>
<h5 id="but-for"><a href="#but-for" class="headerlink" title="but for,"></a>but for,</h5><p>In fact, but for his invitation, I wouldn’t have to come at all.</p>
<h5 id="badger-v"><a href="#badger-v" class="headerlink" title="badger, v.,,"></a>badger, v.,,</h5><h5 id="substantial"><a href="#substantial" class="headerlink" title="substantial,"></a>substantial,</h5><p>I think I’m lucky to be sitting next to you, and getting a nice, substanial transfusion.</p>
<h5 id="testify-vi"><a href="#testify-vi" class="headerlink" title="testify, vi.,"></a>testify, vi.,</h5><p>You are young,  and yet they were particularly brilliant the day before yesterday, as more than three thousand Greeks can testfy.</p>
<h5 id="sarcastic-adj"><a href="#sarcastic-adj" class="headerlink" title="sarcastic, adj."></a>sarcastic, adj.</h5><h5 id="pour-offering"><a href="#pour-offering" class="headerlink" title="pour offering"></a>pour offering</h5><h5 id="frail-adj"><a href="#frail-adj" class="headerlink" title="frail, adj."></a>frail, adj.</h5><h5 id="breather-n-短暂的休息"><a href="#breather-n-短暂的休息" class="headerlink" title="breather, n. 短暂的休息"></a>breather, n. 短暂的休息</h5><h5 id="exlpoit-n-英勇行为"><a href="#exlpoit-n-英勇行为" class="headerlink" title="exlpoit, n., 英勇行为"></a>exlpoit, n., 英勇行为</h5><h5 id="object-adj-反对"><a href="#object-adj-反对" class="headerlink" title="object, adj. 反对"></a>object, adj. 反对</h5><h5 id="gist-主旨"><a href="#gist-主旨" class="headerlink" title="gist, 主旨"></a>gist, 主旨</h5><h5 id="antiquity-n-古老"><a href="#antiquity-n-古老" class="headerlink" title="antiquity, n., 古老"></a>antiquity, n., 古老</h5><h5 id="implant-v-灌输"><a href="#implant-v-灌输" class="headerlink" title="implant, v., 灌输"></a>implant, v., 灌输</h5><h5 id="humiliating-adj-羞辱的"><a href="#humiliating-adj-羞辱的" class="headerlink" title="humiliating, adj., 羞辱的"></a>humiliating, adj., 羞辱的</h5><h5 id="cowardly-adj-懦弱的"><a href="#cowardly-adj-懦弱的" class="headerlink" title="cowardly, adj., 懦弱的"></a>cowardly, adj., 懦弱的</h5><h5 id="virtually"><a href="#virtually" class="headerlink" title="virtually,"></a>virtually,</h5><h5 id="put-things-straight"><a href="#put-things-straight" class="headerlink" title="put things straight"></a>put things straight</h5><h5 id="convention-习俗，常规"><a href="#convention-习俗，常规" class="headerlink" title="convention, 习俗，常规"></a>convention, 习俗，常规</h5><h5 id="haphazard-无序的，混乱的"><a href="#haphazard-无序的，混乱的" class="headerlink" title="haphazard 无序的，混乱的"></a>haphazard 无序的，混乱的</h5><p>That is why the effect of this Eros is haphazard&mdash;sometimes good, sometimes the reverse.</p>
